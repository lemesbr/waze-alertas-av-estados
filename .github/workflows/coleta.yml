name: Coleta Waze - Av. dos Estados

on:
  schedule:
    # A cada 5 min, das 22h às 03h UTC (19h-00h Brasília), seg a sex
    - cron: '*/5 22-23 * * 1-5'
    - cron: '*/5 0-3 * * 2-6'
    # Fim de semana também
    - cron: '*/5 22-23 * * 0,6'
    - cron: '*/5 0-3 * * 0,6'
  workflow_dispatch:  # Rodar manualmente

jobs:
  coletar:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Executar coleta
        run: python coleta_waze.py

      - name: Commit dados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add dados/alertas_waze.csv || true
          git diff --staged --quiet || git commit -m "dados: coleta automatica"
          git push
