name: Coleta Waze - Av. dos Estados

on:
  schedule:
      - cron: '*/5 22-23 * * 1-5'
      - cron: '*/5 0-3 * * 2-6'
      - cron: '*/5 22-23 * * 0,6'
      - cron: '*/5 0-3 * * 0,6'
    workflow_dispatch:

jobs:
  coletar:
      runs-on: ubuntu-latest
      permissions:
      contents: write

            steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

        - name: Instalar dependencias
        run: pip install requests pandas

      - name: Executar coleta
        run: python coleta_waze.py

        - name: Commit dados
        run: |
          git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dados/
            git diff --staged --quiet || git commit -m "coleta $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
