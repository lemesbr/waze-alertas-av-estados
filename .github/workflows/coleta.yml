name: Coleta Waze - Av. dos Estados

on:
  schedule:
    # A cada 5 min, das 22h às 03h UTC (19h-00h Brasília), seg a sex
    - cron: '*/5 22-23 * * 1-5'
    - cron: '*/5 0-3 * * 2-6'
    # Fim de semana também
    - cron: '*/5 22-23 * * 0,6'
    - cron: '*/5 0-3 * * 0,6'
  workflow_dispatch:  # Rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Executar coleta
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python coleta_waze.py

      - name: Commit dados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          # Só faz o commit se houver mudanças reais
          git diff --staged --quiet || git commit -m "coleta $(date -u +'%Y-%m-%d %H:%M UTC')"
          
          # A MÁGICA ESTÁ AQUI: Puxa as novidades e coloca o seu novo dado no topo
          git pull --rebase origin main
          
          git push
