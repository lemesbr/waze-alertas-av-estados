name: Coleta Waze - Av. dos Estados

on:
  workflow_dispatch:  # Rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest  # Funciona em cloud via RapidAPI (sem WAF)
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Executar coleta
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python coleta_waze.py

      - name: Commit dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add dados/alertas_waze.csv dados/log_coletas.csv || true
          git diff --staged --quiet || git commit -m "coleta $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
